<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amy Sue & Jake's Wedding</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#faf8f5;
    color:#333;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.card{
    background:white;
    padding:40px;
    border-radius:16px;
    box-shadow:0 8px 20px rgba(0,0,0,.1);
    text-align:center;
    max-width:450px;
}

h1{
    margin-bottom:10px;
}

p{
    color:#666;
}

.address{
    display:inline-block;
    font-size:0.9em;
    color:#888;
    margin-top:4px;
    text-decoration:none;
}

.address:visited{
    color:#888;
}

.address:hover{
    color:#8C6A4A;
    text-decoration:underline;
}

a.button{
    display:inline-block;
    margin-top:25px;
    background:#8C6A4A;
    color:white;
    padding:15px 30px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
}

a.button:hover{
    opacity:.9;
}
</style>

</head>

<body>

<div class="card">

    <h1>Amy Sue & Jake's Wedding</h1>

    <p>
        Saturday, April 3, 2027<br>
        4:00 PM – 10:00 PM CDT
    </p>

    <p>
        The Barn at White Oaks<br>
        <a 
            class="address" 
            href="https://www.google.com/maps/search/?api=1&query=The+Barn+at+White+Oaks+675+Grant+Rd+Murray+KY+42071"
        >
            675 Grant Rd<br>
            Murray, KY 42071
        </a>
